name: Import project source

on:
  push:
    paths:
      - '.github/workflows/bootstrap.yml'

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and unpack TopoLab source
        run: |
          curl -fL "https://topolab-ai-topology-review.cuidongzhe009.chatgpt.site/topolab-source.zip" -o /tmp/topolab-source.zip
          unzip -o /tmp/topolab-source.zip -d .
          rm -f public/topolab-source.zip
      - name: Commit project files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import TopoLab source [skip ci]"
          git push
